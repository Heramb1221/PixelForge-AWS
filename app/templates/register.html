{% extends "base.html" %}
{% block title %}Set up your account &mdash; PixelForge{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Set up PixelForge</h1>
    <p class="muted">This deployment supports a single account. Create it now &mdash; this form disappears afterward.</p>

    <form method="post" class="stacked-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autofocus>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" minlength="8" required>
        <p class="hint">At least 8 characters.</p>

        <button type="submit" class="btn-primary">Create account</button>
    </form>

    <p class="muted small">
        Already set up? <a href="{{ url_for('auth.login') }}">Log in instead</a>.
    </p>
</div>
{% endblock %}
